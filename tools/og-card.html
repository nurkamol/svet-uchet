<!DOCTYPE html>
<html lang="ru">
<!-- Исходник og-image.png (1200×630). Пересобрать: см. README, раздел «og:image».
     Не деплой-страница — просто заготовка под скриншот. -->
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/dseg@0.46.0/css/dseg.css" rel="stylesheet">
<style>
/* токены — те же, что в :root у index.html */
:root{
  --housing:#EFF2F0; --panel:#FFFFFF; --ink:#17252B; --ink-soft:#4A5A60; --line:#D8DEDB;
  --lcd:#D9E4CF; --lcd-deep:#C9D6BE; --lcd-ink:#242F21; --lcd-ghost:rgba(36,47,33,.10);
  --accent:#1E5F74; --warn:#D2372E; --money:#8A5B22;
}
*{box-sizing:border-box;margin:0;padding:0}
body{width:1200px;height:630px;background:var(--housing);font-family:'Manrope',sans-serif;color:var(--ink);
  display:flex;flex-direction:column;justify-content:center;padding:0 72px;overflow:hidden;position:relative}
.brand{display:flex;align-items:baseline;gap:14px;margin-bottom:26px}
.brand .name{font-weight:800;font-size:34px;letter-spacing:-.01em}
.brand .model{font-family:'IBM Plex Mono';font-size:16px;font-weight:600;letter-spacing:.08em;
  border:2px solid var(--ink);padding:3px 10px;border-radius:5px}
h1{font-size:44px;font-weight:800;line-height:1.18;letter-spacing:-.02em;max-width:580px}
h1 .kwh{color:var(--accent)}
.sub{margin-top:18px;font-size:19px;color:var(--ink-soft);max-width:500px;line-height:1.45}
.lcd{position:absolute;right:72px;top:50%;transform:translateY(-50%);width:398px;
  background:linear-gradient(178deg,var(--lcd),var(--lcd-deep));border-radius:18px;border:1px solid #B7C4AC;
  box-shadow:inset 0 3px 14px rgba(36,47,33,.18), 0 10px 30px rgba(23,37,43,.10);padding:26px 30px;color:var(--lcd-ink)}
.lcd .top{display:flex;justify-content:space-between;font-family:'IBM Plex Mono';font-size:13px;letter-spacing:.1em;margin-bottom:10px}
.lcd .digits{font-family:'DSEG7-Classic','IBM Plex Mono',monospace;font-size:52px;letter-spacing:.04em;position:relative;white-space:nowrap}
.lcd .digits .ghost{position:absolute;inset:0;color:var(--lcd-ghost)}
.lcd .unit{font-family:'IBM Plex Mono';font-weight:600;font-size:15px;margin-left:8px}
.lcd .row{display:flex;justify-content:space-between;align-items:center;margin-top:14px;
  font-family:'IBM Plex Mono';font-size:14px;padding-top:12px;border-top:1px solid rgba(36,47,33,.18)}
.lcd .row .v{font-weight:600}
.led{width:10px;height:10px;border-radius:50%;background:var(--warn);box-shadow:0 0 7px rgba(210,55,46,.7);display:inline-block}
.langs{display:flex;gap:8px;margin-top:30px;font-family:'IBM Plex Mono';font-size:14px;font-weight:600}
.langs span{border:1px solid var(--line);background:var(--panel);color:var(--ink-soft);padding:5px 11px;border-radius:6px}
.langs span.on{background:var(--accent);border-color:var(--accent);color:#fff}
</style>
</head>
<body>
  <div class="brand"><span class="name">Свет·Учёт</span><span class="model">EX518</span></div>
  <h1>Показания счётчика —<br>в понятные <span class="kwh">кВт·ч и сумы</span></h1>
  <div class="sub">Блочный тариф, графики и прогноз. Всё считается в вашем браузере.</div>

  <div class="lcd">
    <div class="top"><span>+A · IMPORT</span><span>L1 L2 L3</span></div>
    <div class="digits"><span class="ghost">888888.88</span><span>2 125,97</span><span class="unit">kW·h</span></div>
    <div class="row"><span>ЗА МЕСЯЦ</span><span class="v">307,2 kW·h</span></div>
    <div class="row"><span><span class="led"></span>&nbsp;К ОПЛАТЕ</span><span class="v">226 480 сум</span></div>
  </div>

  <div class="langs"><span class="on">RU</span><span>O’z</span><span>Ўз</span></div>
</body>
</html>
